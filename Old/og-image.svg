<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04383F"/>
      <stop offset="0.6" stop-color="#07515E"/>
      <stop offset="1" stop-color="#0E626F"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#19717D" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#19717D" stop-opacity="1"/>
      <stop offset="0.8" stop-color="#19717D" stop-opacity="1"/>
      <stop offset="1" stop-color="#19717D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative grid -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Logo block -->
  <g transform="translate(80,80)">
    <rect width="76" height="76" rx="8" fill="#FFFFFF"/>
    <text x="38" y="54" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="32" fill="#04383F" text-anchor="middle" letter-spacing="-1">TW</text>
  </g>
  <text x="180" y="118" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="30" fill="#FFFFFF" letter-spacing="-0.5">True Worth</text>
  <text x="180" y="148" font-family="Inter, Arial, sans-serif" font-weight="300" font-size="22" fill="#B7CCD1" letter-spacing="2">CONSULTING</text>

  <!-- top thin rule -->
  <line x1="80" y1="220" x2="280" y2="220" stroke="#3FA9B5" stroke-width="3"/>

  <!-- Eyebrow -->
  <text x="80" y="262" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="18" fill="#3FA9B5" letter-spacing="3">BOUTIQUE DE ESTRATÉGIA</text>

  <!-- Tagline (3 linhas) -->
  <text x="80" y="330" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="54" fill="#FFFFFF" letter-spacing="-1.5">Estratégia, M&amp;A, Supply</text>
  <text x="80" y="394" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="54" fill="#FFFFFF" letter-spacing="-1.5">e IA aplicada para</text>
  <text x="80" y="458" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="54" fill="#FFFFFF" letter-spacing="-1.5">empresas que tratam</text>
  <text x="80" y="522" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="54" fill="#FFFFFF" font-style="italic" letter-spacing="-1.5">margem como decisão.</text>

  <!-- bottom rule -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#rule)" opacity="0.6"/>

  <!-- Footer line -->
  <text x="80" y="588" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="18" fill="#B7CCD1" letter-spacing="0.5">trwcon.com</text>
  <text x="1120" y="588" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="18" fill="#B7CCD1" letter-spacing="0.5" text-anchor="end">CEOs · Conselhos · Investidores</text>
</svg>
